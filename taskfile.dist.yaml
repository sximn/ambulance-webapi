version: '3'

env:
  AMBULANCE_API_ENVIRONMENT: Development
  AMBULANCE_API_PORT: "8080"

tasks:
  default:
    cmds:
      - task: start

  start:
    desc: Run the ambulance API service
    cmds:
      - go run ./cmd/ambulance-api-service

  openapi:
    desc: Generate OpenAPI client using openapi-generator-cli
    cmds:
      - docker run --rm -it -v {{.ROOT_DIR}}:/local openapitools/openapi-generator-cli generate -c /local/scripts/generator-cfg.yaml
