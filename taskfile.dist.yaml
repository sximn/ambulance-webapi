version: '3'

env:
  AMBULANCE_API_ENVIRONMENT: Development
  AMBULANCE_API_PORT: "8080"
  AMBULANCE_API_MONGODB_USERNAME: root
  AMBULANCE_API_MONGODB_PASSWORD: neUhaDnes

vars:
  COMPOSE_FILE: "{{.ROOT_DIR}}/deployments/docker-compose/compose.yaml"

tasks:
  default:
    cmds:
      - task: start

  start:
    desc: Start MongoDB, run the service, then tear down MongoDB
    cmds:
      - task: mongo-up-detach
      - defer: {task: mongo-down}
      - go run {{.ROOT_DIR}}/cmd/ambulance-api-service
  
  test:
    desc: Run test for the app
    cmds:
      - go test -v ./...

  openapi:
    desc: Generate OpenAPI client using openapi-generator-cli
    cmds:
      - docker run --rm -it -v {{.ROOT_DIR}}:/local openapitools/openapi-generator-cli generate -c /local/scripts/generator-cfg.yaml

  mongo:
    desc: Start MongoDB in the foreground
    cmds:
      - docker compose --file {{.COMPOSE_FILE}} up

  mongo-up-detach:
    internal: true
    cmds:
      - docker compose --file {{.COMPOSE_FILE}} up --detach

  mongo-down:
    internal: true
    cmds:
      - docker compose --file {{.COMPOSE_FILE}} down
